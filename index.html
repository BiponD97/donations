<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রামকৃষ্ণ আশ্রম ও রামকৃষ্ণ মিশন, ময়মনসিংহ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Serif Bengali', Georgia, serif;
  background: linear-gradient(160deg, #fef6e8 0%, #f5e6c8 50%, #ead7b0 100%);
  min-height: 100vh;
  color: #3d2817;
  line-height: 1.5;
}
.hidden { display: none !important; }

/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.login-cover { width: 100%; max-width: 520px; height: 160px; object-fit: cover; border-radius: 12px 12px 0 0; box-shadow: 0 -2px 20px rgba(139,69,19,.2); }
.login-card { background: linear-gradient(135deg,#fffaf0,#fef6e8); padding: 30px; border-radius: 16px; max-width: 460px; width: 100%; box-shadow: 0 12px 40px rgba(139,69,19,.25); border: 2px solid #c9893d; }
.login-card h2 { color: #5a2a0c; font-size: 20px; line-height: 1.4; margin-bottom: 4px; }
.login-card .sub { font-size: 12px; color: #a87145; letter-spacing: 2px; margin-top: 6px; }
.login-card .om { font-size: 30px; color: rgba(180,90,30,.4); margin: 8px 0; }
.login-center { text-align: center; margin-bottom: 20px; }

/* INPUTS */
label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #8b4513; }
input, select, textarea { width: 100%; padding: 10px 13px; border: 1.5px solid #d4a574; border-radius: 8px; font-size: 14px; outline: none; background: #fffdf7; font-family: inherit; color: #3d2817; }
input:focus, select:focus, textarea:focus { border-color: #c9893d; box-shadow: 0 0 0 3px rgba(201,137,61,.1); }
.field { margin-bottom: 12px; }

/* BUTTONS */
.btn { padding: 11px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg,#8b4513,#c9893d); color: #fff5e0; }
.btn-ghost { background: transparent; border: 1.5px solid #c9893d; color: #8b4513; }
.btn-block { width: 100%; }
.btn-danger { background: #fde8e8; color: #a02828; border: 1.5px solid #e8b8b8; }
.btn-success { background: linear-gradient(135deg,#25d366,#128c7e); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.link-btn { background: none; border: none; color: #8b4513; font-weight: 700; font-size: 13px; cursor: pointer; text-decoration: underline; padding: 0; font-family: inherit; }

/* HEADER */
.cover-banner { width: 100%; height: 200px; overflow: hidden; position: relative; }
.cover-banner img { width: 100%; height: 100%; object-fit: cover; }
.cover-banner::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.05), rgba(139,69,19,.4)); }

header.main-header { background: linear-gradient(135deg,#8b4513,#a0522d 30%,#c9893d 60%,#b8651e); box-shadow: 0 4px 30px rgba(139,69,19,.4); border-bottom: 3px solid #5a2a0c; }
.header-band { height: 6px; background: repeating-linear-gradient(90deg,#5a2a0c 0 8px,#c9893d 8px 16px,#ffd591 16px 24px,#c9893d 24px 32px,#5a2a0c 32px 40px); }
.header-inner { max-width: 1280px; margin: 0 auto; padding: 18px 20px 12px; display: flex; justify-content: space-between; gap: 16px; }
.header-center { text-align: center; flex: 1; }
.header-center .om { font-size: 32px; }
.header-center h1 { color: #fff5e0; font-size: 24px; font-weight: 700; letter-spacing: 1px; text-shadow: 1px 2px 4px rgba(0,0,0,.3); }
.header-center .sub { font-size: 11px; color: #ffd591; letter-spacing: 4px; margin-top: 4px; text-transform: uppercase; }
.header-center .quote { font-size: 11px; color: #f5b970; margin-top: 6px; font-style: italic; }
.settings-btn { background: rgba(255,245,224,.1); border: 1px solid rgba(255,213,145,.3); color: #ffd591; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px; opacity: .6; }
.settings-btn:hover { opacity: 1; }

/* TABS */
.tabs { display: flex; gap: 6px; padding: 0 20px 12px; flex-wrap: wrap; justify-content: center; }
.tab { padding: 8px 16px; border: 1.5px solid rgba(255,213,145,.4); border-radius: 8px; background: rgba(255,245,224,.1); color: #fff5e0; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; position: relative; }
.tab.active { background: rgba(255,213,145,.25); border-color: #ffd591; }
.tab-badge { background: #a02828; color: #fff; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-left: 6px; }

/* MAIN */
main { max-width: 1280px; margin: 0 auto; padding: 24px 20px 40px; }

/* CARDS */
.card { background: linear-gradient(135deg,#fffaf0,#fef6e8); border-radius: 12px; padding: 22px; box-shadow: 0 4px 20px rgba(139,69,19,.12); border: 1px solid #d4a574; border-top: 4px solid #c9893d; margin-bottom: 16px; }
.card h3 { color: #5a2a0c; font-size: 17px; margin-bottom: 14px; }
.section-title { font-size: 12px; font-weight: 700; color: #8b4513; margin: 16px 0 10px; text-transform: uppercase; letter-spacing: 2px; padding-bottom: 6px; border-bottom: 1.5px dotted #c9893d; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid > .full { grid-column: 1 / -1; }
.search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

/* DASHBOARD */
.dash-hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
.hero-card { padding: 20px; border-radius: 14px; color: #fff5e0; box-shadow: 0 4px 18px rgba(139,69,19,.2); }
.hero-card .icon { font-size: 26px; margin-bottom: 4px; }
.hero-card .num { font-size: 28px; font-weight: 800; }
.hero-card .lbl { font-size: 12px; opacity: .92; margin-top: 4px; }
.hero-1 { background: linear-gradient(135deg,#8b4513,#c9893d); }
.hero-2 { background: linear-gradient(135deg,#5a3a8a,#8e6db5); }
.hero-3 { background: linear-gradient(135deg,#27632a,#4a8a4d); }
.hero-4 { background: linear-gradient(135deg,#a02828,#c0392b); cursor: pointer; }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #d4a574; background: #fffdf7; box-shadow: 0 4px 20px rgba(139,69,19,.12); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 12px 8px; text-align: left; font-size: 11px; font-weight: 700; color: #8b4513; border-bottom: 2px solid #c9893d; white-space: nowrap; background: #f5e6c8; }
td { padding: 10px 8px; border-bottom: 1px solid #ead7b0; white-space: nowrap; }
tbody tr:nth-child(even) { background: #fef6e8; }
tbody tr:hover { background: #ffeed8; }
.cell-paid { color: #27632a; font-weight: 700; }
.cell-unpaid { color: #c9a574; }
.cell-current { background: rgba(255,213,145,.3) !important; }
.month-cell { text-align: center; cursor: pointer; }
.due-badge { display: inline-block; background: #fde8e8; color: #a02828; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; border: 1px solid #e8b8b8; }
.paid-badge { display: inline-block; background: #e0f0d8; color: #27632a; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; border: 1px solid #b5d4a0; }
.name-link { color: #8b4513; text-decoration: underline; cursor: pointer; font-weight: 700; }
.icon-btn { background: rgba(201,137,61,.1); border: none; cursor: pointer; padding: 4px 7px; border-radius: 5px; font-size: 14px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(60,30,10,.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; overflow: auto; }
.modal { background: linear-gradient(135deg,#fffaf0,#fef6e8); border-radius: 14px; max-width: 600px; width: 100%; max-height: 92vh; overflow: auto; box-shadow: 0 25px 70px rgba(60,30,10,.5); border: 2px solid #c9893d; }
.modal-header { background: linear-gradient(135deg,#8b4513,#c9893d); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #5a2a0c; color: #fff5e0; }
.modal-header h3 { color: #fff5e0; }
.modal-close { background: rgba(255,245,224,.2); border: 1px solid rgba(255,213,145,.4); color: #fff5e0; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; font-weight: 700; }
.modal-body { padding: 22px; }
.modal-footer { padding: 14px 22px; border-top: 1px solid #d4a574; display: flex; gap: 10px; justify-content: flex-end; background: #fef6e8; }

/* PROFILE */
.profile-hero { background: linear-gradient(135deg,#8b4513,#a0522d 40%,#c9893d); padding: 28px 22px; text-align: center; color: #fff5e0; border-bottom: 4px solid #5a2a0c; }
.avatar { width: 76px; height: 76px; margin: 0 auto 12px; border-radius: 50%; background: linear-gradient(135deg,#ffd591,#f5b970); color: #5a2a0c; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; border: 4px solid #fff5e0; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1px; background: #d4a574; }
.stat-box { background: #fffaf0; padding: 14px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 800; }
.stat-lbl { font-size: 11px; color: #8b6f47; }
.profile-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 0; }
@media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
.profile-col { padding: 22px; border-right: 1px solid #d4a574; }
.profile-col h4 { color: #5a2a0c; font-size: 14px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1.5px dotted #c9893d; }
.contact-block { background: #fffdf7; padding: 12px 14px; border-radius: 8px; border: 1px solid #ead7b0; margin-bottom: 12px; }
.contact-block .lbl { font-size: 11px; color: #8b6f47; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.contact-block .val { font-size: 14px; color: #3d2817; font-weight: 500; }
.month-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 14px; }
.month-tile { padding: 8px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
.month-tile.paid { background: #e0f0d8; color: #27632a; border: 1px solid #b5d4a0; }
.month-tile.due { background: #fde8e8; color: #a02828; border: 1px solid #e8b8b8; }
.month-tile.future { background: #f5e6c8; color: #8b6f47; border: 1px solid #d4a574; }
.due-alert { background: linear-gradient(135deg,#fde8e8,#f5d4d4); color: #a02828; padding: 12px 14px; border-radius: 8px; margin-top: 14px; border: 1px solid #e8b8b8; }
.year-tabs { display: flex; gap: 8px; padding: 12px 20px; background: #fef6e8; border-bottom: 1px solid #d4a574; flex-wrap: wrap; }
.year-tab { padding: 5px 14px; border: 1.5px solid #d4a574; background: #fffdf7; color: #8b4513; border-radius: 16px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; }
.year-tab.active { background: linear-gradient(135deg,#8b4513,#c9893d); color: #fff5e0; border-color: #5a2a0c; }

/* DUES ALERT */
.dues-banner { background: linear-gradient(135deg,#c0392b,#a02828); padding: 20px 24px; border-radius: 14px; margin-bottom: 18px; color: #fff5e0; }
.dues-banner .head { font-size: 12px; opacity: .9; letter-spacing: 1px; }
.dues-banner .num { font-size: 26px; font-weight: 800; margin-top: 4px; }

/* TOAST */
.toast { position: fixed; top: 16px; right: 16px; background: linear-gradient(135deg,#8b4513,#a0522d); color: #fff5e0; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(139,69,19,.4); z-index: 9999; border: 1px solid #ffd591; }
.error-box { margin-top: 10px; padding: 8px 12px; background: #fde8e8; color: #a02828; border-radius: 6px; font-size: 13px; border: 1px solid #e8b8b8; }
.empty { text-align: center; color: #8b6f47; padding: 40px; background: #fffdf7; border-radius: 12px; border: 1px dashed #d4a574; }
.hint { text-align: center; color: #a87145; font-size: 12px; margin-top: 12px; font-style: italic; }
footer.main-footer { text-align: center; padding: 30px 20px; font-size: 12px; color: #8b6f47; border-top: 1px solid rgba(180,90,30,.2); }

/* PRINT */
@media print {
  body { background: #fff; }
  .no-print, header.main-header, footer.main-footer, .cover-banner { display: none !important; }
}
</style>

    .reduce((s, d) => s + (parseFloat(d.Amount) || 0), 0);

const getDueMonths = (devRow, year) => {
  const lastMonth = year == CURRENT_YEAR ? CURRENT_MONTH : 11;
  return MONTHS.slice(0, lastMonth + 1).filter(m => {
    const d = getDonation(devRow, year, m);
    return !d || !d.Amount || d.Amount == 0;
  });
};

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// API

async function apiGet() {
  const res = await fetch(`${state.url}?pw=${encodeURIComponent(state.pw)}`);
  return await res.json();
}
async function apiPost(payload) {
  const res = await fetch(state.url, {
    method: "POST",
    body: JSON.stringify({ ...payload, pw: state.pw }),
    headers: { "Content-Type": "text/plain;charset=utf-8" },
  });
  return await res.json();
}

async function login(url, pw) {
  try {
    const r = await fetch(url, {
      method: "POST",
      body: JSON.stringify({ action: "login", pw: pw }),
      headers: { "Content-Type": "text/plain;charset=utf-8" },
    });
    const j = await r.json();
    if (j.status === "ok") {
      state.url = url; state.pw = pw; state.loggedIn = true;
      localStorage.setItem("rk_url", url);
      localStorage.setItem("rk_pw", pw);
      await loadData();
      render();
      return true;
    }
    return false;
  } catch (e) { return false; }
}

async function loadData() {
  state.loading = true; render();
  try {
    const j = await apiGet();
    if (j.status === "ok") {
      state.devotees = j.devotees || [];
      state.donations = j.donations || [];
    }
  } catch (e) { showToast("⚠ লোড ব্যর্থ"); }
  state.loading = false; render();
}

function logout() {
  localStorage.removeItem("rk_pw");
  state.pw = ""; state.loggedIn = false;
  render();
}

window.submitDevotee = async function(row) {
  const data = {
    Name: $("#fName").value, Mobile: $("#fMobile").value, Address: $("#fAddress").value,
    SpouseName: $("#fSpouse").value, SpouseMobile: $("#fSpouseM").value,
    ChildrenSiblings: $("#fFamily").value, InitiationGuru: $("#fGuru").value,
  };
  if (!data.Name) { showToast("⚠ নাম দিতে হবে"); return; }
  
  if (row) {
    const old = state.devotees.find(d => d._row == row);
    for (const key of Object.keys(data)) {
      if (data[key] !== old[key]) {
        await apiPost({ action: "updateDevotee", _row: row, field: key, value: data[key] });
      }
    }
    showToast("✓ আপডেট হয়েছে");
  } else {
    await apiPost({ action: "addDevotee", ...data });
    showToast("✓ ভক্ত যোগ হয়েছে");
  }
  state.editData = null;
  state.tab = "devotees";
  await loadData();
};

    showToast(`✓ ${MONTHS_BN[month]} সংরক্ষিত`);

};

window.sendWhatsApp = function(devRow) {
  const dev = state.devotees.find(d => d._row == devRow);
  const which = $("#rRecipient").value;
  const phone = which === "spouse" ? dev.SpouseMobile : dev.Mobile;
  if (!phone) { alert("মোবাইল নং নেই"); return; }
  let cleaned = phone.toString().replace(/[^0-9]/g, "");
  if (cleaned.startsWith("0")) cleaned = "880" + cleaned.slice(1);
  const msg = $("#rMessage").value;
  window.open(`https://wa.me/${cleaned}?text=${encodeURIComponent(msg)}`, "_blank");
};
window.sendSMS = function(devRow) {
  const dev = state.devotees.find(d => d._row == devRow);
  const which = $("#rRecipient").value;
  const phone = which === "spouse" ? dev.SpouseMobile : dev.Mobile;
  if (!phone) { alert("মোবাইল নং নেই"); return; }
  const msg = $("#rMessage").value;
  window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
};

  navigator.clipboard.writeText($("#rMessage").value).then(() => showToast("✓ কপি হয়েছে"));

            <h4>📊 চাঁদার ইতিহাস · ${toBn(py)}</h4>
            <div class="month-grid">
              ${MONTHS.map(m => {
                const e = getDonation(d._row, py, m);
                const amt = e ? parseFloat(e.Amount) || 0 : 0;
                const paid = amt > 0;
                const past = py < CURRENT_YEAR || (py == CURRENT_YEAR && MONTHS.indexOf(m) <= CURRENT_MONTH);
                const cls = paid ? 'paid' : (past ? 'due' : 'future');
                return `
                  <div class="month-tile ${cls}" onclick='openDonationModal(${d._row}, ${py}, "${m}")'>
                    <div style="display:flex;justify-content:space-between;font-weight:700;">
                      <span>${MONTHS_BN[m].slice(0,4)}</span>
                      <span>${paid ? '৳' + amt : (past ? 'বকেয়া' : '—')}</span>
                    </div>
                    ${paid && e.ReceiptNo ? `<div style="font-size:10px;opacity:.8;">রসিদ: ${esc(e.ReceiptNo)}</div>` : ''}
                    ${paid && e.Date ? `<div style="font-size:10px;opacity:.7;">📅 ${esc(e.Date)}</div>` : ''}
                  </div>
                `;
              }).join("")}
            </div>
            ${due.length > 0 ? `
              <div class="due-alert">
                ⚠ <strong>${toBn(due.length)} মাসের চাঁদা বকেয়া:</strong>
                <div style="margin-top:4px;">${due.map(m => MONTHS_BN[m]).join(', ')}</div>
                <button class="btn btn-sm" style="margin-top:10px;background:linear-gradient(135deg,#c0392b,#a02828);color:#fff;" onclick='openReminder(${d._row}, ${py})'>📨 স্মরণিকা পাঠান</button>
              </div>
            ` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

.stat .num { font-size: 16px; font-weight: 800; color: #8b4513; }

</style></head><body>
<div class="hdr">

  <div style="font-size:11px;color:#a87145;letter-spacing:2px;margin-top:4px;">মাসিক চাঁদা পঞ্জিকা</div>

  return `
    <div class="modal-overlay" onclick="closeSettings()">
      <div class="modal" style="max-width:540px;" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3>⚙ সেটিংস</h3>
          <button class="modal-close" onclick="closeSettings()">✕</button>
        </div>
        <div class="modal-body">
          <div style="background:#fff3cd;border:1px solid #ffc107;padding:10px 14px;border-radius:6px;font-size:12px;color:#856404;margin-bottom:14px;">
            ⚠ এই পৃষ্ঠা শুধুমাত্র অ্যাডমিনদের জন্য।
          </div>
          <div class="field"><label>🔗 Apps Script URL</label><input id="sUrl" value="${esc(state.url)}"></div>
          <div class="field"><label>🔐 পাসওয়ার্ড</label><input type="password" id="sPw" value="${esc(state.pw)}"></div>
          <div style="display:flex;gap:10px;margin-top:18px;justify-content:space-between;flex-wrap:wrap;">
            <div style="display:flex;gap:8px;">
              <button class="btn btn-primary" onclick="saveSettings()">✓ সংরক্ষণ</button>
              <button class="btn btn-ghost" onclick="closeSettings()">বাতিল</button>
            </div>
            <button class="btn btn-danger" onclick="doLogout()">🚪 লগআউট</button>
          </div>
        </div>

}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderMain() {
  const main = $("#mainContent");
  if (!main) return;
  let content = "";
  if (state.loading) content = '<p style="text-align:center;padding:24px;color:#8b6f47;">লোড হচ্ছে...</p>';
  else if (state.tab === "dashboard") content = viewDashboard();
  else if (state.tab === "devotees") content = viewDevotees();
  else if (state.tab === "ledger") content = viewLedger();
  else if (state.tab === "dues") content = viewDues();
  else if (state.tab === "add") content = viewDevoteeForm(null);
  else if (state.tab === "edit" && state.editData) content = viewDevoteeForm(state.editData);
  main.innerHTML = content;
}

function render() {
  if (!state.loggedIn) {
    $("#app").innerHTML = viewLogin();
    return;
  }

  let html = viewHeader();
  html += '<main id="mainContent"></main>';
  html += '<footer class="main-footer"><div style="font-size:24px;color:rgba(180,90,30,.4);">❦ ॐ ❦</div><p><strong>রামকৃষ্ণ আশ্রম ও রামকৃষ্ণ মিশন, ময়মনসিংহ</strong> — মাসিক চাঁদা পঞ্জিকা</p><p style="font-size:11px;color:#a87145;">🔒 Secured · Powered by Google Sheets</p></footer>';

  if (state.profileDevotee) html += viewProfile();
  if (state.donationModal) html += viewDonationModal();
  if (state.reminderModal) html += viewReminderModal();
  if (state.showSettings) html += viewSettings();

  $("#app").innerHTML = html;
  renderMain();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  if (state.url && state.pw) {
    // try auto-login
    try {
      const r = await fetch(state.url, {
        method: "POST",
        body: JSON.stringify({ action: "login", pw: state.pw }),
        headers: { "Content-Type": "text/plain;charset=utf-8" },
      });
      const j = await r.json();
      if (j.status === "ok") {
        state.loggedIn = true;
        await loadData();
      }
    } catch (e) {}
  }
  render();
}

init();
</script>
